<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧊 냉장고 AI 레시피 추천 - 이미지 분석 & 레시피 생성</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.95;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #eee;
      background: white;
    }

    .tab-button {
      flex: 1;
      padding: 20px;
      border: none;
      background: white;
      cursor: pointer;
      font-size: 1em;
      font-weight: 600;
      color: #999;
      transition: all 0.3s ease;
      border-bottom: 3px solid transparent;
    }

    .tab-button:hover {
      color: #667eea;
    }

    .tab-button.active {
      color: #667eea;
      border-bottom-color: #667eea;
      background: #f8f9ff;
    }

    .content {
      padding: 40px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .upload-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 40px;
    }

    .upload-area {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .upload-box {
      border: 3px dashed #667eea;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f8f9ff;
    }

    .upload-box:hover {
      border-color: #764ba2;
      background: #f0f2ff;
    }

    .upload-box.dragging {
      border-color: #764ba2;
      background: #e8ebff;
    }

    .upload-icon {
      font-size: 3em;
      margin-bottom: 10px;
    }

    .upload-text {
      color: #333;
      font-size: 1em;
      margin-bottom: 5px;
    }

    .upload-hint {
      color: #999;
      font-size: 0.9em;
    }

    #imageInput {
      display: none;
    }

    .preview-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .preview-box {
      border-radius: 15px;
      overflow: hidden;
      background: #f8f9ff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 300px;
      border: 2px solid #eee;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .preview-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .info-item {
      background: #f8f9ff;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .info-label {
      color: #999;
      font-size: 0.85em;
      margin-bottom: 5px;
    }

    .info-value {
      color: #333;
      font-size: 1.2em;
      font-weight: 600;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }

    .btn {
      flex: 1;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f0f2ff;
      color: #667eea;
    }

    .btn-secondary:hover {
      background: #e8ebff;
    }

    .results-section {
      margin-top: 40px;
    }

    .results-section h2 {
      color: #333;
      margin-bottom: 30px;
      font-size: 1.8em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      border: 4px solid #f0f2ff;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .error {
      background: #fee;
      border-left: 4px solid #e74c3c;
      padding: 20px;
      border-radius: 10px;
      color: #c0392b;
      margin-bottom: 30px;
    }

    .success {
      background: #efe;
      border-left: 4px solid #27ae60;
      padding: 20px;
      border-radius: 10px;
      color: #229954;
      margin-bottom: 30px;
    }

    .ingredients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .ingredient-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .ingredient-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }

    .ingredient-name {
      font-size: 1.2em;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .ingredient-en {
      font-size: 0.9em;
      opacity: 0.8;
      margin-bottom: 15px;
      font-style: italic;
    }

    .ingredient-details {
      font-size: 0.9em;
      line-height: 1.8;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 15px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .detail-label {
      opacity: 0.8;
    }

    .detail-value {
      font-weight: 600;
    }

    .confidence-bar {
      background: rgba(255, 255, 255, 0.3);
      height: 8px;
      border-radius: 4px;
      margin-top: 10px;
      overflow: hidden;
    }

    .confidence-fill {
      background: #4CAF50;
      height: 100%;
      transition: width 0.3s ease;
    }

    .summary-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-top: 40px;
    }

    .summary-card {
      background: #f8f9ff;
      padding: 30px;
      border-radius: 15px;
      border-left: 4px solid #667eea;
    }

    .summary-card h3 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.3em;
    }

    .category-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .category-name {
      color: #666;
      font-weight: 500;
    }

    .category-count {
      background: #667eea;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .stat-item {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid #eee;
    }

    .stat-label {
      color: #999;
      font-size: 0.85em;
      margin-bottom: 8px;
    }

    .stat-value {
      color: #667eea;
      font-size: 1.5em;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 3em;
      margin-bottom: 20px;
    }

    /* Recipe styles */
    .recipes-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    .recipe-card {
      background: white;
      border: 2px solid #eee;
      border-radius: 15px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .recipe-card:hover {
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      border-color: #667eea;
    }

    .recipe-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px;
    }

    .recipe-title {
      font-size: 1.8em;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .recipe-title-en {
      font-size: 1em;
      opacity: 0.8;
      font-style: italic;
    }

    .recipe-description {
      font-size: 0.95em;
      line-height: 1.5;
      margin-top: 15px;
    }

    .recipe-meta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .meta-item {
      background: rgba(255, 255, 255, 0.2);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .meta-label {
      font-size: 0.8em;
      opacity: 0.8;
    }

    .meta-value {
      font-size: 1.2em;
      font-weight: 600;
      margin-top: 5px;
    }

    .recipe-content {
      padding: 25px;
    }

    .recipe-section {
      margin-bottom: 30px;
    }

    .recipe-section h4 {
      color: #333;
      font-size: 1.2em;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ingredient-list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .ingredient-item {
      background: #f8f9ff;
      padding: 12px;
      border-radius: 8px;
      border-left: 3px solid #667eea;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ingredient-item.unavailable {
      opacity: 0.6;
    }

    .ingredient-badge {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8em;
    }

    .available-badge {
      background: #4CAF50;
      color: white;
      border-radius: 50%;
    }

    .unavailable-badge {
      background: #ddd;
      color: #999;
      border-radius: 50%;
    }

    .instruction-list {
      list-style: none;
    }

    .instruction-item {
      margin-bottom: 20px;
      background: #f8f9ff;
      padding: 15px;
      border-radius: 10px;
      border-left: 4px solid #667eea;
    }

    .instruction-step {
      display: flex;
      align-items: flex-start;
      gap: 15px;
    }

    .step-number {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }

    .step-content {
      flex: 1;
    }

    .step-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }

    .step-description {
      color: #666;
      line-height: 1.6;
      font-size: 0.95em;
    }

    .step-duration {
      font-size: 0.85em;
      color: #999;
      margin-top: 8px;
    }

    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .nutrition-item {
      background: #f8f9ff;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .nutrition-label {
      color: #999;
      font-size: 0.85em;
      margin-bottom: 8px;
    }

    .nutrition-value {
      color: #667eea;
      font-size: 1.4em;
      font-weight: 600;
    }

    .coverage-badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .preference-form {
      background: #f8f9ff;
      padding: 30px;
      border-radius: 15px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 0.95em;
    }

    .form-select {
      width: 100%;
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      font-family: inherit;
    }

    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .checkbox-item input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-item label {
      cursor: pointer;
      user-select: none;
    }

    @media (max-width: 768px) {
      .upload-section {
        grid-template-columns: 1fr;
      }

      .summary-section {
        grid-template-columns: 1fr;
      }

      .ingredients-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 1.8em;
      }

      .content {
        padding: 20px;
      }

      .recipe-meta {
        grid-template-columns: repeat(2, 1fr);
      }

      .nutrition-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .tabs {
        flex-direction: column;
      }

      .tab-button {
        border-bottom: none;
        border-left: 3px solid transparent;
      }

      .tab-button.active {
        border-bottom: none;
        border-left-color: #667eea;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <span>🧊</span>
        <span>냉장고 AI 레시피 추천</span>
      </h1>
      <p>이미지로 재료 인식 → AI가 맞춤형 레시피 추천</p>
    </div>

    <div class="tabs">
      <button class="tab-button active" data-tab="tab1">
        🖼️ 1단계: 재료 인식
      </button>
      <button class="tab-button" data-tab="tab2">
        👨‍🍳 2단계: 레시피 생성
      </button>
    </div>

    <div class="content">
      <!-- Tab 1: 재료 인식 -->
      <div class="tab-content active" id="tab1">
        <div class="upload-section">
          <div class="upload-area">
            <div class="upload-box" id="dropZone">
              <div class="upload-icon">📸</div>
              <div class="upload-text">이미지를 드래그하거나 클릭하세요</div>
              <div class="upload-hint">JPG, PNG, WebP (최대 10MB)</div>
            </div>
            <input type="file" id="imageInput" accept="image/*" />
          </div>

          <div class="preview-section">
            <div class="preview-box" id="previewBox">
              <div class="empty-state">
                <div class="empty-state-icon">🖼️</div>
                <div>이미지 미리보기</div>
              </div>
            </div>
            <div class="preview-info" id="previewInfo" style="display: none">
              <div class="info-item">
                <div class="info-label">파일명</div>
                <div class="info-value" id="fileName">-</div>
              </div>
              <div class="info-item">
                <div class="info-label">파일 크기</div>
                <div class="info-value" id="fileSize">-</div>
              </div>
              <div class="info-item">
                <div class="info-label">가로 × 세로</div>
                <div class="info-value" id="imageDim">-</div>
              </div>
              <div class="info-item">
                <div class="info-label">분석 소요시간</div>
                <div class="info-value" id="analyzeTime">-</div>
              </div>
            </div>
          </div>
        </div>

        <div class="button-group">
          <button class="btn btn-primary" id="analyzeBtn" disabled>
            🚀 재료 분석
          </button>
          <button class="btn btn-secondary" id="resetBtn">🔄 초기화</button>
        </div>

        <div class="results-section" id="resultsSection" style="display: none">
          <h2 id="resultsTitle">📊 분석 결과</h2>

          <div id="loadingState" style="display: none">
            <div class="loading">
              <div class="spinner"></div>
              <p>AI가 냉장고 내용을 분석 중입니다...</p>
            </div>
          </div>

          <div id="resultsContent" style="display: none">
            <div id="errorMessage"></div>
            <div id="successMessage"></div>

            <div id="ingredientsContainer">
              <h3 style="color: #333; margin-bottom: 20px">🥬 인식된 재료</h3>
              <div class="ingredients-grid" id="ingredientsList"></div>
            </div>

            <div class="summary-section" id="summarySection" style="display: none">
              <div class="summary-card">
                <h3>📈 카테고리별 분포</h3>
                <div id="categoriesList"></div>
              </div>

              <div class="summary-card">
                <h3>📊 통계</h3>
                <div class="stats-grid">
                  <div class="stat-item">
                    <div class="stat-label">총 재료</div>
                    <div class="stat-value" id="totalItems">0</div>
                  </div>
                  <div class="stat-item">
                    <div class="stat-label">평균 신뢰도</div>
                    <div class="stat-value" id="avgConfidence">0%</div>
                  </div>
                </div>
              </div>
            </div>

            <button class="btn btn-primary" id="nextStepBtn" style="margin-top: 30px; display: none">
              👨‍🍳 2단계: 레시피 생성으로 이동
            </button>
          </div>
        </div>
      </div>

      <!-- Tab 2: 레시피 생성 -->
      <div class="tab-content" id="tab2">
        <div id="recipeEmptyState" style="display: none">
          <div class="empty-state">
            <div class="empty-state-icon">👉</div>
            <div>먼저 1단계에서 냉장고 이미지를 분석해주세요!</div>
          </div>
        </div>

        <div id="recipeSection" style="display: none">
          <div class="preference-form">
            <h3 style="color: #333; margin-bottom: 20px">⚙️ 레시피 선호도 설정</h3>

            <div class="form-group">
              <label class="form-label">생성할 레시피 수</label>
              <select id="recipeCount" class="form-select">
                <option value="1">1개</option>
                <option value="2">2개</option>
                <option value="3" selected>3개</option>
                <option value="4">4개</option>
                <option value="5">5개</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">조리시간 제한 (분)</label>
              <select id="cookingTimeLimit" class="form-select">
                <option value="15">15분 이내</option>
                <option value="30">30분 이내</option>
                <option value="60" selected>60분 이내</option>
                <option value="120">120분 이내</option>
                <option value="999">제한 없음</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">난이도</label>
              <select id="difficulty" class="form-select">
                <option value="easy">쉬움</option>
                <option value="medium" selected>중간</option>
                <option value="hard">어려움</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">식단 제약사항</label>
              <div class="checkbox-group">
                <div class="checkbox-item">
                  <input type="checkbox" id="vegetarian" value="vegetarian" />
                  <label for="vegetarian">채식</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="vegan" value="vegan" />
                  <label for="vegan">비건</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="glutenFree" value="gluten-free" />
                  <label for="glutenFree">글루텐 프리</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="dairyFree" value="dairy-free" />
                  <label for="dairyFree">유제품 미포함</label>
                </div>
              </div>
            </div>
          </div>

          <div class="button-group">
            <button class="btn btn-primary" id="generateRecipesBtn">
              🍳 레시피 생성
            </button>
            <button class="btn btn-secondary" id="backBtn">⬅️ 1단계로 돌아가기</button>
          </div>

          <div id="recipeLoadingState" style="display: none">
            <div class="loading">
              <div class="spinner"></div>
              <p>AI가 맛있는 레시피를 만들어 내는 중입니다...</p>
            </div>
          </div>

          <div id="recipesContent" style="display: none">
            <div id="recipeErrorMessage"></div>
            <div id="recipeSuccessMessage"></div>
            <div class="recipes-grid" id="recipesList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============ Tab Management ============
    const tabButtons = document.querySelectorAll('.tab-button');
    const tabContents = document.querySelectorAll('.tab-content');

    tabButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const tabId = button.getAttribute('data-tab');

        tabButtons.forEach((btn) => btn.classList.remove('active'));
        tabContents.forEach((content) => content.classList.remove('active'));

        button.classList.add('active');
        document.getElementById(tabId).classList.add('active');
      });
    });

    // ============ Tab 1: 재료 인식 ============
    const dropZone = document.getElementById('dropZone');
    const imageInput = document.getElementById('imageInput');
    const previewBox = document.getElementById('previewBox');
    const previewInfo = document.getElementById('previewInfo');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resultsSection = document.getElementById('resultsSection');
    const resultsContent = document.getElementById('resultsContent');
    const loadingState = document.getElementById('loadingState');
    const nextStepBtn = document.getElementById('nextStepBtn');

    let selectedImage = null;
    let imageBase64 = null;
    let currentIngredients = null;

    // 파일 선택
    dropZone.addEventListener('click', () => imageInput.click());

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleImageSelect(file);
    });

    // 드래그 앤 드롭
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragging');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragging');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragging');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        handleImageSelect(file);
      }
    });

    function handleImageSelect(file) {
      selectedImage = file;
      const reader = new FileReader();

      reader.onload = (e) => {
        imageBase64 = e.target.result.split(',')[1];
        displayPreview();
        analyzeBtn.disabled = false;
      };

      reader.readAsDataURL(file);
    }

    function displayPreview() {
      const img = new Image();
      img.onload = () => {
        previewBox.innerHTML = `<img src="${img.src}" alt="Preview" />`;
        document.getElementById('fileName').textContent = selectedImage.name;
        document.getElementById('fileSize').textContent =
          (selectedImage.size / 1024).toFixed(2) + ' KB';
        document.getElementById('imageDim').textContent =
          img.width + ' × ' + img.height;
        previewInfo.style.display = 'grid';
      };
      img.src = URL.createObjectURL(selectedImage);
    }

    // 분석 시작
    analyzeBtn.addEventListener('click', async () => {
      if (!imageBase64) return;

      analyzeBtn.disabled = true;
      resultsSection.style.display = 'block';
      resultsContent.style.display = 'none';
      loadingState.style.display = 'block';

      try {
        const startTime = Date.now();
        const response = await fetch('/api/v1/fridge/analyze-base64', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            imageBase64: imageBase64,
            mimeType: selectedImage.type,
          }),
        });

        const analyzeTime = Date.now() - startTime;
        document.getElementById('analyzeTime').textContent =
          (analyzeTime / 1000).toFixed(1) + '초';

        // 응답 Content-Type 확인
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          throw new Error(`예상치 못한 응답 형식: ${contentType || 'unknown'}. API가 JSON을 반환하지 않았습니다.`);
        }

        const responseText = await response.text();
        let data;
        try {
          data = JSON.parse(responseText);
        } catch (parseError) {
          console.error('JSON 파싱 실패:', responseText.substring(0, 500));
          throw new Error(`서버 응답을 파싱할 수 없습니다: ${parseError.message}\n응답: ${responseText.substring(0, 200)}`);
        }

        if (!response.ok) {
          throw new Error(data.message || `서버 에러 (${response.status}): ${JSON.stringify(data)}`);
        }

        currentIngredients = data.ingredients;
        displayResults(data);
      } catch (error) {
        loadingState.style.display = 'none';
        resultsContent.style.display = 'block';
        console.error('분석 에러:', error);
        document.getElementById('errorMessage').innerHTML = `
          <div class="error">
            <strong>❌ 오류:</strong> ${error.message}
            <div style="font-size: 0.9em; margin-top: 10px; color: #666;">
              <p>문제 해결:</p>
              <ul style="margin-left: 20px;">
                <li>이미지를 올바르게 선택했는지 확인하세요</li>
                <li>서버가 실행 중인지 확인하세요 (http://localhost:3000)</li>
                <li>브라우저 개발자 도구(F12) 콘솔에서 자세한 오류를 확인하세요</li>
              </ul>
            </div>
          </div>
        `;
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    function displayResults(data) {
      loadingState.style.display = 'none';
      resultsContent.style.display = 'block';

      const { ingredients, summary } = data;

      if (ingredients.length > 0) {
        document.getElementById('successMessage').innerHTML = `
          <div class="success">
            <strong>✅ 성공!</strong> ${ingredients.length}개 재료가 인식되었습니다.
          </div>
        `;
      }

      const ingredientsList = document.getElementById('ingredientsList');
      if (ingredients.length === 0) {
        ingredientsList.innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">🤔</div><div>인식된 재료가 없습니다</div></div>';
      } else {
        ingredientsList.innerHTML = ingredients
          .map(
            (ing) => `
          <div class="ingredient-card">
            <div class="ingredient-name">${ing.name}</div>
            <div class="ingredient-en">${ing.englishName || ing.nameEn || ''}</div>
            <div class="ingredient-details">
              <div class="detail-row">
                <span class="detail-label">수량:</span>
                <span class="detail-value">${ing.quantity} ${ing.unit}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">분류:</span>
                <span class="detail-value">${getCategoryLabel(ing.category)}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">신선도:</span>
                <span class="detail-value">${getConditionLabel(ing.condition)}</span>
              </div>
              ${
                ing.estimatedExpiry
                  ? `
                <div class="detail-row">
                  <span class="detail-label">유통기한:</span>
                  <span class="detail-value">${ing.estimatedExpiry}</span>
                </div>
              `
                  : ''
              }
              <div class="detail-row">
                <span class="detail-label">신뢰도:</span>
                <span class="detail-value">${(ing.confidence * 100).toFixed(0)}%</span>
              </div>
              <div class="confidence-bar">
                <div class="confidence-fill" style="width: ${ing.confidence * 100}%"></div>
              </div>
            </div>
          </div>
        `
          )
          .join('');
      }

      const summarySection = document.getElementById('summarySection');
      if (ingredients.length > 0) {
        const categoriesList = document.getElementById('categoriesList');
        categoriesList.innerHTML = Object.entries(summary.categories)
          .filter(([, count]) => count > 0)
          .map(
            ([cat, count]) => `
          <div class="category-item">
            <span class="category-name">${getCategoryLabel(cat)}</span>
            <span class="category-count">${count}개</span>
          </div>
        `
          )
          .join('');

        document.getElementById('totalItems').textContent = summary.totalItems;
        document.getElementById('avgConfidence').textContent = (
          summary.averageConfidence * 100
        ).toFixed(0) + '%';

        summarySection.style.display = 'grid';
        nextStepBtn.style.display = 'block';
      } else {
        summarySection.style.display = 'none';
        nextStepBtn.style.display = 'none';
      }
    }

    nextStepBtn.addEventListener('click', () => {
      document.querySelector('[data-tab="tab2"]').click();
      if (currentIngredients && currentIngredients.length > 0) {
        document.getElementById('recipeEmptyState').style.display = 'none';
        document.getElementById('recipeSection').style.display = 'block';
      }
    });

    resetBtn.addEventListener('click', () => {
      imageInput.value = '';
      selectedImage = null;
      imageBase64 = null;
      currentIngredients = null;
      previewBox.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🖼️</div>
          <div>이미지 미리보기</div>
        </div>
      `;
      previewInfo.style.display = 'none';
      resultsSection.style.display = 'none';
      analyzeBtn.disabled = true;

      document.getElementById('recipeEmptyState').style.display = 'block';
      document.getElementById('recipeSection').style.display = 'none';
    });

    // ============ Tab 2: 레시피 생성 ============
    const generateRecipesBtn = document.getElementById('generateRecipesBtn');
    const backBtn = document.getElementById('backBtn');
    const recipeEmptyState = document.getElementById('recipeEmptyState');
    const recipeSection = document.getElementById('recipeSection');
    const recipeLoadingState = document.getElementById('recipeLoadingState');
    const recipesContent = document.getElementById('recipesContent');

    // Check initial state
    if (!currentIngredients || currentIngredients.length === 0) {
      recipeEmptyState.style.display = 'block';
      recipeSection.style.display = 'none';
    }

    generateRecipesBtn.addEventListener('click', async () => {
      if (!currentIngredients || currentIngredients.length === 0) {
        alert('먼저 1단계에서 재료를 분석해주세요.');
        return;
      }

      const dietaryRestrictions = [];
      if (document.getElementById('vegetarian').checked)
        dietaryRestrictions.push('vegetarian');
      if (document.getElementById('vegan').checked)
        dietaryRestrictions.push('vegan');
      if (document.getElementById('glutenFree').checked)
        dietaryRestrictions.push('gluten-free');
      if (document.getElementById('dairyFree').checked)
        dietaryRestrictions.push('dairy-free');

      const preferences = {
        dietaryRestrictions,
        allergens: [],
        cookingTimeLimit: parseInt(
          document.getElementById('cookingTimeLimit').value
        ),
        difficulty: document.getElementById('difficulty').value,
        cuisineType: [],
        recipeCount: parseInt(document.getElementById('recipeCount').value),
      };

      generateRecipesBtn.disabled = true;
      recipeLoadingState.style.display = 'block';
      recipesContent.style.display = 'none';

      try {
        const response = await fetch('/api/v1/recipes/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ingredients: currentIngredients,
            preferences: preferences,
          }),
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || '레시피 생성 실패');
        }

        const data = await response.json();
        displayRecipes(data);
      } catch (error) {
        recipeLoadingState.style.display = 'none';
        recipesContent.style.display = 'block';
        document.getElementById('recipeErrorMessage').innerHTML = `
          <div class="error"><strong>오류:</strong> ${error.message}</div>
        `;
      } finally {
        generateRecipesBtn.disabled = false;
      }
    });

    function displayRecipes(data) {
      recipeLoadingState.style.display = 'none';
      recipesContent.style.display = 'block';

      const { recipes, summary } = data;

      if (recipes.length > 0) {
        document.getElementById('recipeSuccessMessage').innerHTML = `
          <div class="success">
            <strong>✅ 성공!</strong> ${recipes.length}개의 맛있는 레시피를 찾았습니다.
          </div>
        `;
      }

      const recipesList = document.getElementById('recipesList');
      recipesList.innerHTML = recipes
        .map(
          (recipe) => `
        <div class="recipe-card">
          <div class="recipe-header">
            <div class="recipe-title">${recipe.name}</div>
            <div class="recipe-title-en">${recipe.nameEn}</div>
            <div class="recipe-description">${recipe.description}</div>
            <div class="recipe-meta">
              <div class="meta-item">
                <div class="meta-label">⏱️ 조리시간</div>
                <div class="meta-value">${recipe.cookingTime}분</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">⏰ 준비시간</div>
                <div class="meta-value">${recipe.prepTime}분</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">🍽️ 인원</div>
                <div class="meta-value">${recipe.servings}인분</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">난이도</div>
                <div class="meta-value">${getDifficultyLabel(recipe.difficulty)}</div>
              </div>
            </div>
          </div>
          <div class="recipe-content">
            <div class="coverage-badge">
              📊 보유 재료: ${recipe.coveragePercentage}
            </div>

            <div class="recipe-section">
              <h4>🥘 재료</h4>
              <ul class="ingredient-list">
                ${recipe.ingredients
                  .map(
                    (ing) => `
                  <li class="ingredient-item ${ing.available ? '' : 'unavailable'}">
                    <div class="ingredient-badge ${ing.available ? 'available-badge' : 'unavailable-badge'}">
                      ${ing.available ? '✓' : '✗'}
                    </div>
                    <div>
                      <div><strong>${ing.name}</strong></div>
                      <div style="font-size: 0.85em; opacity: 0.7;">${ing.quantity}${ing.unit}</div>
                    </div>
                  </li>
                `
                  )
                  .join('')}
              </ul>
            </div>

            <div class="recipe-section">
              <h4>👨‍🍳 조리법</h4>
              <ol class="instruction-list">
                ${recipe.instructions
                  .map(
                    (instr) => `
                  <li class="instruction-item">
                    <div class="instruction-step">
                      <div class="step-number">${instr.step}</div>
                      <div class="step-content">
                        <div class="step-title">${instr.title}</div>
                        <div class="step-description">${instr.description}</div>
                        <div class="step-duration">⏱️ 약 ${instr.duration}분</div>
                        ${
                          instr.tips.length > 0
                            ? `<div style="margin-top: 8px; font-size: 0.85em; color: #667eea;">💡 ${instr.tips.join(', ')}</div>`
                            : ''
                        }
                      </div>
                    </div>
                  </li>
                `
                  )
                  .join('')}
              </ol>
            </div>

            <div class="recipe-section">
              <h4>🥗 영양정보 (1인분)</h4>
              <div class="nutrition-grid">
                <div class="nutrition-item">
                  <div class="nutrition-label">칼로리</div>
                  <div class="nutrition-value">${recipe.nutrition.calories}</div>
                  <div style="font-size: 0.8em; color: #999;">kcal</div>
                </div>
                <div class="nutrition-item">
                  <div class="nutrition-label">단백질</div>
                  <div class="nutrition-value">${recipe.nutrition.protein}</div>
                  <div style="font-size: 0.8em; color: #999;">g</div>
                </div>
                <div class="nutrition-item">
                  <div class="nutrition-label">탄수화물</div>
                  <div class="nutrition-value">${recipe.nutrition.carbs}</div>
                  <div style="font-size: 0.8em; color: #999;">g</div>
                </div>
                <div class="nutrition-item">
                  <div class="nutrition-label">지방</div>
                  <div class="nutrition-value">${recipe.nutrition.fat}</div>
                  <div style="font-size: 0.8em; color: #999;">g</div>
                </div>
              </div>
            </div>

            ${
              recipe.tips.length > 0
                ? `
            <div class="recipe-section">
              <h4>💡 팁</h4>
              <ul style="list-style: none; padding: 0;">
                ${recipe.tips.map((tip) => `<li style="margin-bottom: 10px;">• ${tip}</li>`).join('')}
              </ul>
            </div>
            `
                : ''
            }
          </div>
        </div>
      `
        )
        .join('');
    }

    backBtn.addEventListener('click', () => {
      document.querySelector('[data-tab="tab1"]').click();
    });

    // ============ Helper Functions ============
    function getCategoryLabel(cat) {
      const labels = {
        vegetable: '🥬 채소',
        fruit: '🍎 과일',
        dairy: '🧈 유제품',
        meat: '🥩 육류',
        seafood: '🦞 해산물',
        condiment: '🧂 양념/소스',
        other: '📦 기타',
      };
      return labels[cat] || cat;
    }

    function getConditionLabel(cond) {
      const labels = {
        fresh: '🟢 신선',
        ripe: '🟡 적숙',
        expired: '🔴 만료',
        unknown: '⚪ 미정',
      };
      return labels[cond] || cond;
    }

    function getDifficultyLabel(diff) {
      const labels = {
        easy: '🟢 쉬움',
        medium: '🟡 중간',
        hard: '🔴 어려움',
      };
      return labels[diff] || diff;
    }
  </script>
</body>
</html>
